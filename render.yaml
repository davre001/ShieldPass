# Render Blueprint — backend web service.
# Native auto-deploy: Render watches the connected fork's `main` branch and rebuilds on push.
#
# Build notes:
#  - backend depends on the SDK via `file:../SDK` and SDK/dist is gitignored, so the SDK is
#    compiled first, and the committed circuit json is copied into the SDK dist.
#  - `--include=dev` is required because Render sets NODE_ENV=production, which would otherwise
#    skip devDependencies (typescript, prisma, etc.) that the build needs.
#  - Prisma uses SQLite (`file:./dev.db`). `prisma db push` recreates the schema at build time.
#
# ⚠️ SQLite is NOT persistent on Render's ephemeral filesystem (and the free plan has no disk),
#    so data resets on every deploy/restart. For real persistence, attach a Render Disk mounted
#    at backend/prisma (paid), or switch the datasource to a managed Postgres and use DATABASE_URL.

services:
  - type: web
    name: shieldpass-backend
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: >-
      cd SDK && npm install --include=dev --no-audit --no-fund && npx tsc &&
      cp ../frontend/public/reusable_kyc.json dist/reusable_kyc.json &&
      cd ../backend && npm install --include=dev --no-audit --no-fund && npx prisma generate &&
      npx prisma db push --accept-data-loss && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Non-secret defaults
      - key: STELLAR_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: CHANNELS_URL
        value: https://channels.openzeppelin.com/testnet
      # Secrets — set these in the Render dashboard (sync: false keeps them out of the repo)
      - key: STELLAR_CONTRACT_ID
        sync: false
      - key: STELLAR_RELAYER_SECRET
        sync: false
      - key: CHANNELS_API_KEY
        sync: false
      - key: WALLET_WASM_HASH
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
