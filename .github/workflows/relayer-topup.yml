name: Relayer Daily Top-up

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC every day
  workflow_dispatch:         # manual trigger for testing

jobs:
  topup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Top up relayer (friendbot a fresh account, merge it into the relayer)
        env:
          # The relayer ADDRESS is public, so it may live as a repo Variable OR a Secret.
          RELAYER: ${{ vars.STELLAR_RELAYER_ADDRESS || secrets.STELLAR_RELAYER_ADDRESS }}
        run: |
          if [ -z "$RELAYER" ]; then
            echo "STELLAR_RELAYER_ADDRESS not set as a Variable or Secret — aborting."
            exit 1
          fi
          # Install the SDK in a scratch dir (keeps it out of the repo workspaces), copy the
          # committed script next to it, and run. ESM resolves '@stellar/stellar-sdk' from cwd.
          mkdir -p /tmp/topup
          cp scripts/relayer-topup.mjs /tmp/topup/relayer-topup.mjs
          cd /tmp/topup
          npm init -y >/dev/null 2>&1
          npm install @stellar/stellar-sdk@14 --no-audit --no-fund
          node relayer-topup.mjs
